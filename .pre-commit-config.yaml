repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
    - id: check-yaml
      exclude: "(mkdocs.yml|recipe/meta.yaml)"
    - id: end-of-file-fixer
    - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
    - id: ruff-check
      args: [--fix]
    - id: ruff-format
  - repo: local
    hooks:
    - id: ty
      name: ty
      entry: ty check
      language: system
      pass_filenames: false
      types_or: [python, pyi]
